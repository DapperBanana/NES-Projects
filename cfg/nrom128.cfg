# ld65 linker configuration for NROM-128 (mapper 0)
# 16KB PRG-ROM + 8KB CHR-ROM

MEMORY {
    HDR:    start = $0000, size = $0010, type = ro, fill = yes, file = %O;
    ZP:     start = $0000, size = $0100, type = rw;
    RAM:    start = $0200, size = $0600, type = rw;
    PRG:    start = $C000, size = $4000, type = ro, fill = yes, file = %O;
    CHR:    start = $0000, size = $2000, type = ro, fill = yes, file = %O;
}

SEGMENTS {
    HEADER:   load = HDR,  type = ro;
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = RAM,  type = bss;
    CODE:     load = PRG,  type = ro,  start = $C000;
    RODATA:   load = PRG,  type = ro;
    VECTORS:  load = PRG,  type = ro,  start = $FFFA;
    CHARS:    load = CHR,  type = ro;
}
